version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_DATABASE: test_ravi
      MYSQL_USER: admin
      MYSQL_PASSWORD: Admin@123
      MYSQL_ROOT_PASSWORD: Admin@123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - project-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uadmin", "-pAdmin@123"]
      interval: 10s
      timeout: 5s
      retries: 5

  springboot-app:
    build:
      context: ./oled
      dockerfile: dockerfile
    container_name: springboot-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/test_ravi?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: Admin@123
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - project-net

  frontend:
    build:
      context: ./frontend/frontend
      dockerfile: dockerfile
    container_name: frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - springboot-app
    networks:
      - project-net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: admin
      PMA_PASSWORD: Admin@123
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - project-net

volumes:
  mysql-data:

networks:
  project-net:
    driver: bridge
